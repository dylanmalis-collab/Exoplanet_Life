version: 2

models:
  - name: fact_mesures_planet
    description: "Modèle contenant les mesures et caractéristiques physiques des exoplanètes."

    columns:
      - name: pl_name
        description: "Nom de la planète."
        tests:
          - not_null

      - name: hostname
        description: "Nom de l'étoile hôte."
        tests:
          - not_null

      - name: discoverymethod
        description: "Nom de la méthode de découverte."
        tests:
          - not_null

      - name: periode_orbitale
        description: "Période orbitale de la planète."

      - name: demi_grand_axe_orbite
        description: "Demi-grand axe de l'orbite."

      - name: rayon_planete_terre
        description: "Rayon de la planète en rayons terrestres."

      - name: rayon_planete_jupiter
        description: "Rayon de la planète en rayons jupitériens."

      - name: masse_planete_terre_ou_msin_i
        description: "Masse de la planète en masses terrestres ou m sin i."

      - name: masse_planete_jupiter_ou_msin_i
        description: "Masse de la planète en masses jupitériennes ou m sin i."

      - name: densite_planete
        description: "Densité de la planète."

      - name: excentricite_orbite
        description: "Excentricité de l'orbite."

      - name: flux_insolation
        description: "Flux d'insolation reçu par la planète."

      - name: temperature_equilibre
        description: "Température d'équilibre de la planète."

      - name: milieu_transit
        description: "Milieu du transit."

      - name: ind_variations_temps_transit
        description: "Indicateur de variation des temps de transit."

      - name: profondeur_occultation
        description: "Profondeur de l'occultation."

      - name: masse_10_24kg
        description: "Masse dans l'unité 10^24 kg."

      - name: gravite_terre
        description: "Gravité exprimée en g terrestre."

      - name: score_roch
        description: "Score de Roche."

      - name: type_planete
        description: "Type de planète."
        tests:
          - not_null